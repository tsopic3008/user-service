# H2 in-memory database for tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:tscore_test;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create

# Disable OIDC — use @TestSecurity for secured endpoint tests
quarkus.oidc.tenant-enabled=false

# Stub REST client URLs (overridden per-test via WireMock or mocks)
quarkus.rest-client.keycloak-auth.url=http://localhost:${quarkus.wiremock.devservices.port:0}
quarkus.rest-client.keycloak-token.url=http://localhost:${quarkus.wiremock.devservices.port:0}
quarkus.rest-client.keycloak-admin.url=http://localhost:${quarkus.wiremock.devservices.port:0}
quarkus.rest-client.mailing-service.url=http://localhost:${quarkus.wiremock.devservices.port:0}

keycloak.client.id=tscore-test
keycloak.client.secret=test-secret
keycloak.realm=tscore

quarkus.http.port=0
quarkus.log.level=WARN
quarkus.log.category."com.tscore".level=DEBUG
